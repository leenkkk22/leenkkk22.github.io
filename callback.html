<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>인증 처리 중...</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>인증 정보를 처리 중입니다...</h2>
        <p>자동으로 이동하지 않으면 아래 버튼을 눌러주세요.</p>
        <button id="manualBtn" style="padding: 10px 20px;">회원가입 페이지로 돌아가기</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const localRedirectUri = "http://localhost:8081/kbay/member/auth/callback";

        console.log("전달받은 인가 코드:", code);

        if (code) {
            const finalUrl = `${localRedirectUri}?code=${code}`;
            
            // 수동 버튼에도 주소 연결
            document.getElementById("manualBtn").onclick = function() {
                location.href = finalUrl;
            };

            // 자동 이동 시도
            console.log("로컬 서버로 이동 시도:", finalUrl);
            location.href = finalUrl;
        } else {
            alert("인증 코드를 찾을 수 없습니다. 다시 시도해 주세요.");
        }
    </script>
</body>
</html>
